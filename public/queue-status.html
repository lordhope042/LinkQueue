<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LinkQueue - Queue Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 10% 20%, #0a0a1f, #02020a); min-height: 100vh; color: #eef5ff; }
    .glass { background: rgba(15, 25, 35, 0.6); backdrop-filter: blur(14px); border: 1px solid rgba(34, 211, 238, 0.25); border-radius: 1.5rem; box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(5,10,25,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(34,211,238,0.2); }
    .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #22D3EE); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: #eef5ff; text-decoration: none; font-weight: 500; }
    .nav-links a:hover { color: #22D3EE; }
    .queue-header { text-align: center; padding: 1.5rem; margin-bottom: 1.5rem; }
    .queue-icon { font-size: 2.5rem; color: #22D3EE; }
    .queue-name { font-size: 1.8rem; font-weight: 700; color: #22D3EE; word-break: break-word; }
    .queue-desc { opacity: 0.8; margin: 0.5rem 0; }
    .stats { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
    .stat { background: rgba(34,211,238,0.1); padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.85rem; }
    
    /* Prominent Two-Stage Display */
    .two-stage-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    
    .stage-card {
      padding: 1.5rem;
      text-align: center;
      border-radius: 1.5rem;
      transition: transform 0.2s;
    }
    
    .stage-card.serving-card {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(34, 197, 94, 0.05));
      border: 2px solid #22c55e;
    }
    
    .stage-card.next-card {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
      border: 2px solid #f59e0b;
    }
    
    .stage-card.waiting-card {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.15), rgba(34, 211, 238, 0.05));
      border: 2px solid #22D3EE;
    }
    
    .stage-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .stage-header i {
      font-size: 1.5rem;
    }
    
    .serving-card .stage-header i { color: #22c55e; }
    .next-card .stage-header i { color: #f59e0b; }
    .waiting-card .stage-header i { color: #22D3EE; }
    
    .stage-header h3 {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .serving-card .stage-header h3 { color: #22c55e; }
    .next-card .stage-header h3 { color: #f59e0b; }
    .waiting-card .stage-header h3 { color: #22D3EE; }
    
    .stage-content {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .stage-name-large {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      word-break: break-word;
    }
    
    .serving-card .stage-name-large { color: #22c55e; }
    .next-card .stage-name-large { color: #f59e0b; }
    
    .stage-name-large.empty {
      opacity: 0.4;
      font-style: italic;
      font-weight: 400;
      color: #eef5ff;
    }
    
    .stage-subtitle {
      font-size: 0.8rem;
      opacity: 0.7;
    }
    
    .grace-timer-large {
      margin-top: 0.8rem;
      padding: 0.5rem;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 1rem;
    }
    
    .grace-timer-large.warning {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }
    
    .grace-timer-large.expired {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .grace-timer-large i {
      margin-right: 0.5rem;
    }
    
    .waiting-count-badge {
      text-align: center;
      padding: 0.8rem;
      background: rgba(0,0,0,0.2);
      border-radius: 1rem;
      margin-top: 0.5rem;
    }
    
    .waiting-count-badge .count {
      font-size: 2rem;
      font-weight: 800;
      color: #22D3EE;
    }
    
    .workflow-info {
      text-align: center;
      padding: 0.8rem;
      background: rgba(34,211,238,0.05);
      border-radius: 1rem;
      margin: 1rem 0;
      font-size: 0.8rem;
      border: 1px dashed rgba(34,211,238,0.3);
    }
    
    .workflow-info i {
      color: #22D3EE;
      margin: 0 0.3rem;
    }
    
    .position-card { text-align: center; padding: 2rem; margin-bottom: 1.5rem; }
    .position-number { font-size: 4rem; font-weight: 800; color: #22D3EE; }
    .position-label { opacity: 0.7; letter-spacing: 2px; }
    .wait-time { margin-top: 0.5rem; color: #a5f3fc; }
    .status-badge { display: inline-block; padding: 0.3rem 1rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 600; margin-top: 0.5rem; }
    .status-badge.serving { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-badge.next { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .status-badge.waiting { background: rgba(34, 211, 238, 0.2); color: #22D3EE; }
    
    .section-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 1.2rem; font-weight: 600; }
    .participant-list { max-height: 400px; overflow-y: auto; }
    .participant-item { background: rgba(0,0,0,0.3); padding: 0.8rem 1rem; border-radius: 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 1rem; }
    .participant-item.serving { background: rgba(34, 197, 94, 0.15); border-left: 4px solid #22c55e; }
    .participant-item.next { background: rgba(245, 158, 11, 0.15); border-left: 4px solid #f59e0b; }
    .participant-item.current { background: linear-gradient(95deg, rgba(91,33,182,0.4), rgba(34,211,238,0.2)); border-left: 4px solid #22D3EE; }
    .participant-pos { font-weight: 700; min-width: 50px; }
    .participant-name { flex: 1; word-break: break-word; }
    .participant-time { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 1rem; background: rgba(34,211,238,0.2); }
    .participant-badge { font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 1rem; margin-left: 0.5rem; }
    .participant-badge.serving { background: #22c55e; color: white; }
    .participant-badge.next { background: #f59e0b; color: white; }
    .you-badge { background: #22D3EE; color: #0a0a1f; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 600; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; width: 100%; margin-top: 1rem; font-size: 1rem; transition: 0.2s; }
    .btn-outline { background: transparent; border: 1px solid #22D3EE; color: #22D3EE; }
    .btn-outline:hover { background: rgba(34,211,238,0.1); }
    .btn-primary { background: linear-gradient(95deg, #5B21B6, #7c3aed); border: none; color: white; font-weight: 600; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #22D3EE; color: #0a0a1f; padding: 0.8rem 1.5rem; border-radius: 2rem; font-weight: bold; z-index: 1100; animation: fadeInUp 0.3s; }
    .toast.error { background: #ff4757; color: white; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .empty-state { text-align: center; padding: 2rem; opacity: 0.6; }
    .share-section { margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 1rem; }
    .share-link { display: flex; gap: 0.5rem; }
    .share-link input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(34,211,238,0.4); padding: 0.5rem; border-radius: 0.5rem; color: white; }
    .copy-btn { background: #22D3EE; color: #0a0a1f; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
    .notification-banner { background: linear-gradient(95deg, rgba(245,158,11,0.2), rgba(34,211,238,0.1)); border: 2px solid #f59e0b; border-radius: 1rem; padding: 1.2rem; margin-bottom: 1.5rem; text-align: center; }
    .notification-banner i { color: #f59e0b; margin-right: 0.5rem; font-size: 1.2rem; }
    .notification-banner .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
    
    @media (max-width: 768px) { 
      .container { padding: 1rem; } 
      nav { flex-direction: column; gap: 0.8rem; } 
      .queue-name { font-size: 1.3rem; } 
      .position-number { font-size: 2.5rem; }
      .two-stage-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><i class="fas fa-link"></i> LinkQueue</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </div>
</nav>

<div class="container" id="app">
  <div style="text-align: center; padding: 3rem;">
    <i class="fas fa-spinner fa-pulse fa-2x" style="color: #22D3EE;"></i>
    <p style="margin-top: 1rem;">Loading queue...</p>
  </div>
</div>

<script>
  (function() {
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
    console.log('🌐 API:', API_BASE);

    let queueId = null;
    let participantId = null;
    let participantName = null;
    let participantStatus = null;
    let refreshTimer = null;

    const params = new URLSearchParams(window.location.search);
    queueId = params.get('join') || params.get('q');

    const session = localStorage.getItem('my_participant_session');
    if (session) {
      try {
        const s = JSON.parse(session);
        if (s.queueId === queueId) {
          participantId = s.participantId;
          participantName = s.participantName;
        }
      } catch(e) {}
    }

    function toast(msg, err = false) {
      const t = document.createElement('div');
      t.className = 'toast' + (err ? ' error' : '');
      t.innerHTML = `<i class="fas fa-${err ? 'exclamation-triangle' : 'check-circle'}"></i> ${msg}`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function timeAgo(d) {
      const mins = Math.floor((Date.now() - new Date(d)) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      return `${Math.floor(mins/60)}h ${mins%60}m ago`;
    }

    function formatTimeRemaining(seconds) {
      if (seconds <= 0) return 'Expired';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function shareLink() {
      return `${window.location.origin}/join-queue.html?join=${queueId}`;
    }

    async function fetchEnhancedStatus() {
      try {
        const res = await fetch(`${API_BASE}/queues/${queueId}/enhanced-status`);
        const data = await res.json();
        if (res.ok && data.success) return data;
      } catch(e) {}
      return null;
    }

    async function fetchStatus() {
      const res = await fetch(`${API_BASE}/queues/${queueId}/status`);
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Failed');
      return data;
    }

    async function fetchPosition(pId) {
      const res = await fetch(`${API_BASE}/participants/${pId}/position`);
      const data = await res.json();
      if (!res.ok || !data.success) return null;
      return data;
    }

    async function render() {
      const app = document.getElementById('app');

      if (!queueId) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-exclamation-triangle"></i><h2>Invalid Link</h2><a href="index.html" class="btn btn-outline" style="display:inline-block;margin-top:1rem;">Go Home</a></div>`;
        return;
      }

      let status, enhancedStatus;
      try {
        [status, enhancedStatus] = await Promise.all([
          fetchStatus(),
          fetchEnhancedStatus()
        ]);
      } catch(e) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-search"></i><h2>Queue Not Found</h2><p>${esc(e.message)}</p><a href="index.html" class="btn btn-outline" style="display:inline-block;margin-top:1rem;">Go Home</a></div>`;
        return;
      }

      const queue = status.queue;
      const participants = status.participants || [];

      if (!queue.isActive) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-clock"></i><h2>Queue Expired</h2><p>Expired: ${new Date(queue.expiresAt).toLocaleString()}</p><a href="index.html" class="btn btn-outline" style="display:inline-block;margin-top:1rem;">Go Home</a></div>`;
        if (refreshTimer) clearInterval(refreshTimer);
        return;
      }

      let position = null;
      if (participantId) {
        const posData = await fetchPosition(participantId);
        if (posData) {
          position = posData.position;
          participantStatus = posData.status || 'waiting';
        } else {
          participantId = null;
          localStorage.removeItem('my_participant_session');
        }
      }

      if (participantId && !position) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-check-circle" style="color:#22D3EE;"></i><h2>You've Been Served!</h2><button class="btn btn-primary" onclick="localStorage.removeItem('my_participant_session');location.href='index.html'">Start Over</button></div>`;
        if (refreshTimer) clearInterval(refreshTimer);
        return;
      }

      const serving = enhancedStatus?.serving;
      const next = enhancedStatus?.next;
      const waiting = enhancedStatus?.waiting || [];

      const isUserNext = participantId && next && next.participantId === participantId;
      const isUserServing = participantId && serving && serving.participantId === participantId;
      const isUserWaiting = participantId && !isUserServing && !isUserNext;
      
      // Notification banner
      let notificationBanner = '';
      if (isUserNext) {
        const timeRemaining = next.timeRemaining || 0;
        if (timeRemaining > 0) {
          notificationBanner = `
            <div class="notification-banner">
              <div class="title"><i class="fas fa-bell"></i> You are NEXT in line!</div>
              <p>Please prepare. The service provider is ready for you.</p>
              <div style="margin-top: 0.8rem; font-size: 1.1rem; color: #f59e0b;">
                <i class="fas fa-hourglass-half"></i> Respond within <strong>${formatTimeRemaining(timeRemaining)}</strong>
              </div>
            </div>
          `;
        } else {
          notificationBanner = `
            <div class="notification-banner" style="border-color: #ef4444; background: rgba(239,68,68,0.15);">
              <div class="title"><i class="fas fa-exclamation-circle" style="color: #ef4444;"></i> Grace Period Expired!</div>
              <p>Please respond immediately or you may be skipped.</p>
            </div>
          `;
        }
      } else if (isUserServing) {
        notificationBanner = `
          <div class="notification-banner" style="border-color: #22c55e; background: rgba(34,197,94,0.1);">
            <div class="title"><i class="fas fa-check-circle" style="color: #22c55e;"></i> You are being served!</div>
            <p>The service provider is currently attending to you.</p>
          </div>
        `;
      }

      const ahead = position ? participants.filter(p => p.position < position) : [];
      const waitMins = participantStatus === 'serving' ? 0 : (participantStatus === 'next' ? 0 : ahead.length * 2);
      const waitText = participantStatus === 'serving' ? 'Being served now' : 
                      (participantStatus === 'next' ? '🎉 You are next! Get ready!' : 
                      (waitMins ? `~${waitMins} min${waitMins>1?'s':''}` : '🎉 You are next!'));

      // Build HTML
      let html = `
        <div class="glass queue-header">
          <div class="queue-icon"><i class="fas fa-ticket-alt"></i></div>
          <div class="queue-name">${esc(queue.name)}</div>
          ${queue.description ? `<div class="queue-desc">${esc(queue.description)}</div>` : ''}
          <div class="stats">
            <span class="stat"><i class="fas fa-users"></i> ${participants.length} total</span>
            <span class="stat"><i class="fas fa-clock"></i> Expires ${new Date(queue.expiresAt).toLocaleTimeString()}</span>
          </div>
          
          <!-- Two-Stage Prominent Display -->
          <div class="two-stage-container">
            <div class="stage-card serving-card">
              <div class="stage-header">
                <i class="fas fa-user-check"></i>
                <h3>SERVING NOW</h3>
              </div>
              <div class="stage-content">
                <div class="stage-name-large ${!serving ? 'empty' : ''}">${serving ? esc(serving.name) : 'Waiting...'}</div>
                <div class="stage-subtitle">${serving ? 'Currently being attended to' : 'No one is being served'}</div>
              </div>
            </div>
            
            <div class="stage-card next-card">
              <div class="stage-header">
                <i class="fas fa-user-clock"></i>
                <h3>NEXT IN LINE</h3>
              </div>
              <div class="stage-content">
                <div class="stage-name-large ${!next ? 'empty' : ''}">${next ? esc(next.name) : 'Waiting...'}</div>
                <div class="stage-subtitle">${next ? '3-minute grace period' : 'No one in next position'}</div>
                ${next && next.timeRemaining > 0 ? `
                  <div class="grace-timer-large warning">
                    <i class="fas fa-hourglass-half"></i> ${formatTimeRemaining(next.timeRemaining)} remaining
                  </div>
                ` : ''}
                ${next && next.timeRemaining <= 0 ? `
                  <div class="grace-timer-large expired">
                    <i class="fas fa-exclamation-circle"></i> Grace period expired
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
          
          <!-- Waiting Count -->
          <div class="waiting-count-badge">
            <i class="fas fa-users" style="margin-right: 0.5rem; color: #22D3EE;"></i>
            <span class="count">${waiting.length}</span> people waiting in line
          </div>
          
          <!-- Workflow Info -->
          <div class="workflow-info">
            <i class="fas fa-info-circle"></i> 
            When current service completes, NEXT becomes SERVING and next in line becomes NEXT with 3-min notification.
            <i class="fas fa-forward" style="margin-left: 0.5rem;"></i>
          </div>
          
          <div class="share-section">
            <div style="margin-bottom:0.5rem;"><i class="fas fa-share-alt"></i> Share this queue</div>
            <div class="share-link">
              <input type="text" value="${shareLink()}" readonly id="shareInput">
              <button class="copy-btn" onclick="navigator.clipboard.writeText('${shareLink()}');toast('📋 Copied!')"><i class="fas fa-copy"></i></button>
            </div>
          </div>
        </div>
      `;

      // Notification banner
      if (notificationBanner) {
        html += notificationBanner;
      }

      // Position card for the viewer
      if (position) {
        const statusClass = participantStatus === 'serving' ? 'serving' : (participantStatus === 'next' ? 'next' : 'waiting');
        const statusLabel = participantStatus === 'serving' ? '🎯 YOU ARE BEING SERVED' : (participantStatus === 'next' ? '⏰ YOU ARE NEXT' : '⏳ YOU ARE IN QUEUE');
        
        html += `
          <div class="glass position-card">
            <div class="position-label">YOUR STATUS</div>
            <div class="position-number">#${position}</div>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            <div class="wait-time"><i class="fas fa-hourglass-half"></i> ${waitText}</div>
            ${participantName ? `<div style="margin-top:0.8rem;opacity:0.7;">👤 ${esc(participantName)}</div>` : ''}
          </div>
        `;
      }

      // Participant list
      html += `<div class="glass" style="padding:1.5rem;"><div class="section-title"><i class="fas fa-list"></i> All Participants <span style="margin-left:auto;font-size:0.8rem;opacity:0.6;"><i class="fas fa-sync-alt"></i> Auto-refresh</span></div><div class="participant-list">`;

      if (participants.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-user-friends"></i> No one in queue yet</div>';
      } else {
        const sortedParticipants = [...participants].sort((a, b) => {
          if (serving && a.participantId === serving.participantId) return -1;
          if (serving && b.participantId === serving.participantId) return 1;
          if (next && a.participantId === next.participantId) return -1;
          if (next && b.participantId === next.participantId) return 1;
          return a.position - b.position;
        });

        sortedParticipants.forEach(p => {
          const isServing = serving && p.participantId === serving.participantId;
          const isNext = next && p.participantId === next.participantId;
          const isYou = participantId && p.participantId === participantId;
          
          let itemClass = 'participant-item';
          if (isServing) itemClass += ' serving';
          if (isNext) itemClass += ' next';
          if (isYou) itemClass += ' current';
          
          let badge = '';
          if (isServing) badge = '<span class="participant-badge serving">SERVING</span>';
          if (isNext) badge = '<span class="participant-badge next">NEXT</span>';
          
          html += `
            <div class="${itemClass}">
              <span class="participant-pos">#${p.position}</span>
              <span class="participant-name">
                ${esc(p.name)} ${badge}
                ${isYou ? '<span class="you-badge"><i class="fas fa-user"></i> YOU</span>' : ''}
              </span>
              <span class="participant-time">${timeAgo(p.joinedAt)}</span>
            </div>
          `;
        });
      }

      html += `</div><button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh Now</button><div style="text-align:center;font-size:0.7rem;opacity:0.5;margin-top:0.5rem;">Updates every 10s</div></div>`;

      app.innerHTML = html;
      document.getElementById('refreshBtn').onclick = () => { render(); toast('🔄 Refreshed!'); };
    }

    window.toast = toast;

    render().then(() => {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(render, 10000);
    });

    window.addEventListener('beforeunload', () => clearInterval(refreshTimer));
  })();
</script>
</body>
</html>
