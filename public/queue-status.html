<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LinkQueue - Queue Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0a1f, #02020a);
      min-height: 100vh;
      color: #eef5ff;
    }

    .glass {
      background: rgba(15, 25, 35, 0.6);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(34, 211, 238, 0.25);
      border-radius: 1.5rem;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(5, 10, 25, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(34, 211, 238, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #22D3EE);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links a {
      color: #eef5ff;
      text-decoration: none;
      margin-left: 1.5rem;
      transition: color 0.2s;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #22D3EE;
    }

    .queue-header-card {
      text-align: center;
      margin-bottom: 2rem;
      padding: 1.5rem;
    }

    .queue-icon {
      font-size: 2.5rem;
      color: #22D3EE;
      margin-bottom: 0.5rem;
    }

    .queue-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0.5rem 0;
      color: #22D3EE;
    }

    .queue-description {
      opacity: 0.8;
      margin-bottom: 1rem;
    }

    .queue-stats {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .stat-badge {
      background: rgba(34, 211, 238, 0.1);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
    }

    .position-card {
      text-align: center;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .position-number {
      font-size: 4rem;
      font-weight: 800;
      color: #22D3EE;
      margin: 0.5rem 0;
    }

    .position-label {
      font-size: 1rem;
      opacity: 0.7;
      letter-spacing: 2px;
    }

    .waiting-time {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #a5f3fc;
    }

    .queue-visual {
      margin-bottom: 2rem;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .participant-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .participant-item {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.8rem 1rem;
      border-radius: 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: 0.2s;
    }

    .participant-item.current {
      background: linear-gradient(95deg, rgba(91, 33, 182, 0.4), rgba(34, 211, 238, 0.2));
      border-left: 4px solid #22D3EE;
      transform: scale(1.02);
    }

    .participant-position {
      font-weight: 700;
      min-width: 50px;
      font-size: 1.1rem;
    }

    .participant-name {
      flex: 1;
      font-weight: 500;
    }

    .participant-status {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      background: rgba(34, 211, 238, 0.2);
    }

    .current-indicator {
      background: #22D3EE;
      color: #0a0a1f;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .btn-refresh {
      background: transparent;
      border: 1px solid #22D3EE;
      color: #22D3EE;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-top: 1rem;
      font-size: 1rem;
    }

    .btn-refresh:hover {
      background: rgba(34, 211, 238, 0.1);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #22D3EE;
      color: #0a0a1f;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      font-weight: bold;
      z-index: 1100;
      animation: fadeInUp 0.3s ease;
    }

    .toast.error {
      background: #ff4757;
      color: white;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      opacity: 0.6;
    }

    .auto-refresh {
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 1rem;
    }

    .expired-message {
      text-align: center;
      padding: 3rem;
    }

    .expired-message i {
      font-size: 3rem;
      color: #ff6b6b;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      nav { flex-direction: column; gap: 0.8rem; }
      .queue-name { font-size: 1.3rem; }
      .position-number { font-size: 2.5rem; }
      .participant-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <i class="fas fa-link"></i> LinkQueue
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </div>
</nav>

<div class="container" id="mainContainer">
  <!-- Content will be dynamically loaded -->
</div>

<script>
  const API_BASE = 'http://localhost:3000/api';
  let currentQueueId = null;
  let currentParticipantId = null;
  let autoRefreshInterval = null;

  function showToast(message, isError = false) {
    let existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();
    let toast = document.createElement('div');
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Fetch queue status from API
  async function fetchQueueStatus(queueId) {
    try {
      const response = await fetch(`${API_BASE}/queues/${queueId}/status`);
      const data = await response.json();
      
      if (!response.ok || !data.success) {
        throw new Error(data.message || 'Failed to fetch queue status');
      }
      
      return data;
    } catch (error) {
      console.error('Error fetching queue status:', error);
      return null;
    }
  }

  // Fetch participant position from API
  async function fetchParticipantPosition(participantId) {
    try {
      const response = await fetch(`${API_BASE}/participants/${participantId}/position`);
      const data = await response.json();
      
      if (!response.ok || !data.success) {
        return null;
      }
      
      return data;
    } catch (error) {
      console.error('Error fetching position:', error);
      return null;
    }
  }

  function formatTimeAgo(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    
    if (diffMins < 1) return 'just now';
    if (diffMins < 60) return `${diffMins} min ago`;
    return `${Math.floor(diffMins / 60)}h ${diffMins % 60}m ago`;
  }

  async function renderQueueStatus() {
    const container = document.getElementById('mainContainer');
    
    // Fetch queue data from API
    const queueData = await fetchQueueStatus(currentQueueId);
    
    if (!queueData || !queueData.queue) {
      container.innerHTML = `
        <div class="glass expired-message" style="max-width: 500px; margin: 3rem auto;">
          <i class="fas fa-search"></i>
          <h2>Queue Not Found</h2>
          <p>The queue you're looking for doesn't exist or has been deleted.</p>
          <a href="index.html" class="btn-refresh" style="display: inline-block; margin-top: 1rem; text-decoration: none;">Go Home</a>
        </div>
      `;
      return;
    }
    
    const queue = queueData.queue;
    const participants = queueData.participants || [];
    
    // Find current participant position
    let currentPosition = null;
    let currentParticipantData = null;
    
    if (currentParticipantId) {
      const positionData = await fetchParticipantPosition(currentParticipantId);
      if (positionData) {
        currentPosition = positionData.position;
        currentParticipantData = positionData;
      } else {
        // Participant may have been served
        currentParticipantId = null;
        localStorage.removeItem('my_participant_session');
      }
    }
    
    if (!queue.isActive) {
      container.innerHTML = `
        <div class="glass expired-message" style="max-width: 500px; margin: 3rem auto;">
          <i class="fas fa-clock"></i>
          <h2>Queue Expired</h2>
          <p>This queue has expired and is no longer accepting participants.</p>
          <p style="margin-top: 0.5rem; font-size: 0.8rem;">Expired at: ${new Date(queue.expiresAt).toLocaleString()}</p>
          <a href="index.html" class="btn-refresh" style="display: inline-block; margin-top: 1rem; text-decoration: none;">Go Home</a>
        </div>
      `;
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      return;
    }
    
    // If participant not found (maybe was served), show message
    if (currentParticipantId && !currentPosition) {
      container.innerHTML = `
        <div class="glass expired-message" style="max-width: 500px; margin: 3rem auto;">
          <i class="fas fa-check-circle"></i>
          <h2>You've Been Served!</h2>
          <p>Your turn has come. Thank you for using LinkQueue!</p>
          <button onclick="clearSessionAndReload()" class="btn-refresh" style="margin-top: 1rem;">Clear & Continue</button>
        </div>
      `;
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      return;
    }
    
    // Calculate ahead and behind
    const currentIdx = currentPosition ? currentPosition - 1 : -1;
    const ahead = currentPosition ? participants.filter(p => p.position < currentPosition) : [];
    const behind = currentPosition ? participants.filter(p => p.position > currentPosition) : [];
    
    // Estimate wait time (assuming 2 minutes per person)
    const estimatedWaitMinutes = ahead.length * 2;
    const waitTimeText = estimatedWaitMinutes > 0 
      ? `Estimated wait: ~${estimatedWaitMinutes} minute${estimatedWaitMinutes > 1 ? 's' : ''}`
      : 'You are next!';
    
    // Render the full queue status page
    container.innerHTML = `
      <!-- Queue Info Header -->
      <div class="glass queue-header-card">
        <div class="queue-icon">
          <i class="fas fa-ticket-alt"></i>
        </div>
        <div class="queue-name">${escapeHtml(queue.name)}</div>
        ${queue.description ? `<div class="queue-description">${escapeHtml(queue.description)}</div>` : ''}
        <div class="queue-stats">
          <span class="stat-badge"><i class="fas fa-users"></i> ${participants.length} people waiting</span>
          <span class="stat-badge"><i class="fas fa-clock"></i> Expires: ${new Date(queue.expiresAt).toLocaleTimeString()}</span>
        </div>
      </div>
      
      <!-- Current Position Card -->
      <div class="glass position-card">
        <div class="position-label">YOUR POSITION</div>
        <div class="position-number">${currentPosition ? '#' + currentPosition : '—'}</div>
        <div class="waiting-time">
          <i class="fas fa-hourglass-half"></i> ${currentPosition === 1 ? 'You are next in line!' : waitTimeText}
        </div>
      </div>
      
      <!-- Queue Visual -->
      <div class="glass" style="padding: 1.5rem;">
        <div class="section-title">
          <i class="fas fa-users"></i> Queue Status
          <span style="font-size: 0.8rem; opacity: 0.6; margin-left: auto;">
            <i class="fas fa-sync-alt"></i> Auto-refreshes every 10s
          </span>
        </div>
        
        <div class="participant-list">
          ${renderParticipantsList(participants, currentPosition)}
        </div>
        
        <button class="btn-refresh" id="manualRefreshBtn">
          <i class="fas fa-sync-alt"></i> Refresh Now
        </button>
        <div class="auto-refresh">
          <i class="fas fa-info-circle"></i> This page updates automatically
        </div>
      </div>
    `;
    
    // Attach refresh button event
    document.getElementById('manualRefreshBtn')?.addEventListener('click', () => {
      renderQueueStatus();
      showToast('Queue status refreshed!');
    });
  }
  
  function renderParticipantsList(participants, currentPosition) {
    if (participants.length === 0) {
      return '<div class="empty-state"><i class="fas fa-user-friends"></i> No one is in the queue yet. Be the first!</div>';
    }
    
    let html = '';
    
    // Show people ahead (limit to 10 for readability)
    const ahead = participants.filter(p => currentPosition && p.position < currentPosition);
    const behind = participants.filter(p => currentPosition && p.position > currentPosition);
    
    if (ahead.length > 0) {
      html += `<div style="margin-bottom: 1rem;"><i class="fas fa-arrow-up" style="color: #ffaa44;"></i> Ahead of you (${ahead.length})</div>`;
      ahead.slice(-5).forEach((p) => {
        html += `
          <div class="participant-item">
            <span class="participant-position">#${p.position}</span>
            <span class="participant-name">${escapeHtml(p.name)}</span>
            <span class="participant-status">joined ${formatTimeAgo(p.joinedAt)}</span>
          </div>
        `;
      });
      if (ahead.length > 5) {
        html += `<div style="text-align: center; font-size: 0.7rem; opacity: 0.6; margin: 0.5rem 0;">+${ahead.length - 5} more ahead</div>`;
      }
    }
    
    // Current participant (YOU)
    if (currentPosition) {
      const currentParticipant = participants.find(p => p.position === currentPosition);
      html += `
        <div class="participant-item current" style="margin: 0.8rem 0;">
          <span class="participant-position">#${currentPosition}</span>
          <span class="participant-name"><strong>${escapeHtml(currentParticipant?.name || 'You')}</strong> <span class="current-indicator"><i class="fas fa-user"></i> You</span></span>
          <span class="participant-status">joined ${formatTimeAgo(currentParticipant?.joinedAt)}</span>
        </div>
      `;
    }
    
    // Show people behind (limit to 10)
    if (behind.length > 0) {
      html += `<div style="margin-top: 1rem; margin-bottom: 1rem;"><i class="fas fa-arrow-down" style="color: #44ffaa;"></i> Behind you (${behind.length})</div>`;
      behind.slice(0, 5).forEach((p) => {
        html += `
          <div class="participant-item">
            <span class="participant-position">#${p.position}</span>
            <span class="participant-name">${escapeHtml(p.name)}</span>
            <span class="participant-status">joined ${formatTimeAgo(p.joinedAt)}</span>
          </div>
        `;
      });
      if (behind.length > 5) {
        html += `<div style="text-align: center; font-size: 0.7rem; opacity: 0.6; margin-top: 0.5rem;">+${behind.length - 5} more behind</div>`;
      }
    }
    
    return html;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function clearSessionAndReload() {
    localStorage.removeItem('my_participant_session');
    localStorage.removeItem('auth_token');
    localStorage.removeItem('linkqueue_session');
    window.location.href = 'index.html';
  }

  async function init() {
    // Get queue ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    currentQueueId = urlParams.get('join') || urlParams.get('q');
    
    if (!currentQueueId) {
      document.getElementById('mainContainer').innerHTML = `
        <div class="glass expired-message" style="max-width: 500px; margin: 3rem auto;">
          <i class="fas fa-exclamation-triangle"></i>
          <h2>Invalid Queue Link</h2>
          <p>The link you used is invalid or missing queue information.</p>
          <a href="index.html" class="btn-refresh" style="display: inline-block; margin-top: 1rem; text-decoration: none;">Go Home</a>
        </div>
      `;
      return;
    }
    
    // Get participant session
    const stored = localStorage.getItem('my_participant_session');
    if (stored) {
      try {
        const session = JSON.parse(stored);
        if (session.queueId === currentQueueId) {
          currentParticipantId = session.participantId;
        }
      } catch(e) {}
    }
    
    // Verify queue exists
    const queueData = await fetchQueueStatus(currentQueueId);
    if (!queueData || !queueData.queue) {
      document.getElementById('mainContainer').innerHTML = `
        <div class="glass expired-message" style="max-width: 500px; margin: 3rem auto;">
          <i class="fas fa-search"></i>
          <h2>Queue Not Found</h2>
          <p>The queue you're looking for doesn't exist.</p>
          <a href="index.html" class="btn-refresh" style="display: inline-block; margin-top: 1rem; text-decoration: none;">Go Home</a>
        </div>
      `;
      return;
    }
    
    // Render initial status
    await renderQueueStatus();
    
    // Set up auto-refresh every 10 seconds
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(async () => {
      await renderQueueStatus();
    }, 10000);
  }
  
  // Clean up interval on page unload
  window.addEventListener('beforeunload', () => {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  });
  
  // Start the app
  init();
</script>
</body>
</html>
