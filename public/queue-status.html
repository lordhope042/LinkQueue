<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LinkQueue - Queue Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 10% 20%, #0a0a1f, #02020a); min-height: 100vh; color: #eef5ff; }
    .glass { background: rgba(15, 25, 35, 0.6); backdrop-filter: blur(14px); border: 1px solid rgba(34, 211, 238, 0.25); border-radius: 1.5rem; box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(5,10,25,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(34,211,238,0.2); }
    .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #22D3EE); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: #eef5ff; text-decoration: none; font-weight: 500; }
    .nav-links a:hover { color: #22D3EE; }
    .queue-header { text-align: center; padding: 1.5rem; margin-bottom: 1.5rem; }
    .queue-icon { font-size: 2.5rem; color: #22D3EE; }
    .queue-name { font-size: 1.8rem; font-weight: 700; color: #22D3EE; word-break: break-word; }
    .queue-desc { opacity: 0.8; margin: 0.5rem 0; }
    .stats { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
    .stat { background: rgba(34,211,238,0.1); padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.85rem; }
    .position-card { text-align: center; padding: 2rem; margin-bottom: 1.5rem; }
    .position-number { font-size: 4rem; font-weight: 800; color: #22D3EE; }
    .position-label { opacity: 0.7; letter-spacing: 2px; }
    .wait-time { margin-top: 0.5rem; color: #a5f3fc; }
    .section-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 1.2rem; font-weight: 600; }
    .participant-list { max-height: 400px; overflow-y: auto; }
    .participant-item { background: rgba(0,0,0,0.3); padding: 0.8rem 1rem; border-radius: 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 1rem; }
    .participant-item.current { background: linear-gradient(95deg, rgba(91,33,182,0.4), rgba(34,211,238,0.2)); border-left: 4px solid #22D3EE; }
    .participant-pos { font-weight: 700; min-width: 50px; }
    .participant-name { flex: 1; word-break: break-word; }
    .participant-time { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 1rem; background: rgba(34,211,238,0.2); }
    .you-badge { background: #22D3EE; color: #0a0a1f; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 600; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; width: 100%; margin-top: 1rem; font-size: 1rem; transition: 0.2s; }
    .btn-outline { background: transparent; border: 1px solid #22D3EE; color: #22D3EE; }
    .btn-outline:hover { background: rgba(34,211,238,0.1); }
    .btn-primary { background: linear-gradient(95deg, #5B21B6, #7c3aed); border: none; color: white; font-weight: 600; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #22D3EE; color: #0a0a1f; padding: 0.8rem 1.5rem; border-radius: 2rem; font-weight: bold; z-index: 1100; animation: fadeInUp 0.3s; }
    .toast.error { background: #ff4757; color: white; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .empty-state { text-align: center; padding: 2rem; opacity: 0.6; }
    .share-section { margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 1rem; }
    .share-link { display: flex; gap: 0.5rem; }
    .share-link input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(34,211,238,0.4); padding: 0.5rem; border-radius: 0.5rem; color: white; }
    .copy-btn { background: #22D3EE; color: #0a0a1f; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
    @media (max-width: 768px) { .container { padding: 1rem; } nav { flex-direction: column; gap: 0.8rem; } .queue-name { font-size: 1.3rem; } .position-number { font-size: 2.5rem; } }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><i class="fas fa-link"></i> LinkQueue</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </div>
</nav>

<div class="container" id="app">
  <div style="text-align: center; padding: 3rem;">
    <i class="fas fa-spinner fa-pulse fa-2x" style="color: #22D3EE;"></i>
    <p style="margin-top: 1rem;">Loading queue...</p>
  </div>
</div>

<script>
  (function() {
    // API Configuration
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
    console.log('🌐 API:', API_BASE);

    let queueId = null;
    let participantId = null;
    let participantName = null;
    let refreshTimer = null;

    // Get queue ID from URL
    const params = new URLSearchParams(window.location.search);
    queueId = params.get('join') || params.get('q');

    // Load session
    const session = localStorage.getItem('my_participant_session');
    if (session) {
      try {
        const s = JSON.parse(session);
        if (s.queueId === queueId) {
          participantId = s.participantId;
          participantName = s.participantName;
        }
      } catch(e) {}
    }

    // Toast
    function toast(msg, err = false) {
      const t = document.createElement('div');
      t.className = 'toast' + (err ? ' error' : '');
      t.innerHTML = `<i class="fas fa-${err ? 'exclamation-triangle' : 'check-circle'}"></i> ${msg}`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // Escape HTML
    function esc(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Format time
    function timeAgo(d) {
      const mins = Math.floor((Date.now() - new Date(d)) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      return `${Math.floor(mins/60)}h ${mins%60}m ago`;
    }

    // Share link
    function shareLink() {
      return `${window.location.origin}/join-queue.html?join=${queueId}`;
    }

    // Fetch queue status
    async function fetchStatus() {
      const res = await fetch(`${API_BASE}/queues/${queueId}/status`);
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Failed');
      return data;
    }

    // Fetch participant position
    async function fetchPosition(pId) {
      const res = await fetch(`${API_BASE}/participants/${pId}/position`);
      const data = await res.json();
      if (!res.ok || !data.success) return null;
      return data;
    }

    // Render
    async function render() {
      const app = document.getElementById('app');

      if (!queueId) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-exclamation-triangle"></i><h2>Invalid Link</h2><a href="index.html" class="btn btn-outline" style="display:inline-block;margin-top:1rem;">Go Home</a></div>`;
        return;
      }

      let status;
      try {
        status = await fetchStatus();
      } catch(e) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-search"></i><h2>Queue Not Found</h2><p>${esc(e.message)}</p><a href="index.html" class="btn btn-outline" style="display:inline-block;margin-top:1rem;">Go Home</a></div>`;
        return;
      }

      const queue = status.queue;
      const participants = status.participants || [];

      if (!queue.isActive) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-clock"></i><h2>Queue Expired</h2><p>Expired: ${new Date(queue.expiresAt).toLocaleString()}</p><a href="index.html" class="btn btn-outline" style="display:inline-block;margin-top:1rem;">Go Home</a></div>`;
        if (refreshTimer) clearInterval(refreshTimer);
        return;
      }

      // Get position if participant
      let position = null;
      if (participantId) {
        const posData = await fetchPosition(participantId);
        if (posData) {
          position = posData.position;
        } else {
          participantId = null;
          localStorage.removeItem('my_participant_session');
        }
      }

      // Served?
      if (participantId && !position) {
        app.innerHTML = `<div class="glass" style="text-align:center;padding:3rem;"><i class="fas fa-check-circle" style="color:#22D3EE;"></i><h2>You've Been Served!</h2><button class="btn btn-primary" onclick="localStorage.removeItem('my_participant_session');location.href='index.html'">Start Over</button></div>`;
        if (refreshTimer) clearInterval(refreshTimer);
        return;
      }

      const ahead = position ? participants.filter(p => p.position < position) : [];
      const waitMins = ahead.length * 2;
      const waitText = waitMins ? `~${waitMins} min${waitMins>1?'s':''}` : '🎉 You are next!';

      // Build HTML
      let html = `
        <div class="glass queue-header">
          <div class="queue-icon"><i class="fas fa-ticket-alt"></i></div>
          <div class="queue-name">${esc(queue.name)}</div>
          ${queue.description ? `<div class="queue-desc">${esc(queue.description)}</div>` : ''}
          <div class="stats">
            <span class="stat"><i class="fas fa-users"></i> ${participants.length} waiting</span>
            <span class="stat"><i class="fas fa-clock"></i> Expires ${new Date(queue.expiresAt).toLocaleTimeString()}</span>
          </div>
          <div class="share-section">
            <div style="margin-bottom:0.5rem;"><i class="fas fa-share-alt"></i> Share</div>
            <div class="share-link">
              <input type="text" value="${shareLink()}" readonly id="shareInput">
              <button class="copy-btn" onclick="navigator.clipboard.writeText('${shareLink()}');toast('📋 Copied!')"><i class="fas fa-copy"></i></button>
            </div>
          </div>
        </div>
      `;

      // Position card
      if (position) {
        html += `
          <div class="glass position-card">
            <div class="position-label">YOUR POSITION</div>
            <div class="position-number">#${position}</div>
            <div class="wait-time"><i class="fas fa-hourglass-half"></i> ${position === 1 ? '🎉 You are next!' : waitText}</div>
            ${participantName ? `<div style="margin-top:0.5rem;opacity:0.7;">👤 ${esc(participantName)}</div>` : ''}
          </div>
        `;
      } else {
        html += `
          <div class="glass position-card">
            <div class="position-label">QUEUE OVERVIEW</div>
            <div class="position-number">${participants.length}</div>
            <div class="wait-time"><i class="fas fa-users"></i> Total waiting</div>
          </div>
        `;
      }

      // Participant list
      html += `<div class="glass" style="padding:1.5rem;"><div class="section-title"><i class="fas fa-list"></i> Queue <span style="margin-left:auto;font-size:0.8rem;opacity:0.6;"><i class="fas fa-sync-alt"></i> Auto-refresh</span></div><div class="participant-list">`;

      if (participants.length === 0) {
        html += '<div class="empty-state"><i class="fas fa-user-friends"></i> No one in queue yet</div>';
      } else if (position) {
        const aheadList = participants.filter(p => p.position < position);
        const behindList = participants.filter(p => p.position > position);
        
        if (aheadList.length) {
          html += `<div style="margin-bottom:0.5rem;"><i class="fas fa-arrow-up" style="color:#ffaa44;"></i> Ahead (${aheadList.length})</div>`;
          aheadList.slice(-5).forEach(p => {
            html += `<div class="participant-item"><span class="participant-pos">#${p.position}</span><span class="participant-name">${esc(p.name)}</span><span class="participant-time">${timeAgo(p.joinedAt)}</span></div>`;
          });
          if (aheadList.length > 5) html += `<div style="text-align:center;opacity:0.6;">+${aheadList.length-5} more</div>`;
        }

        const me = participants.find(p => p.position === position);
        html += `<div class="participant-item current"><span class="participant-pos">#${position}</span><span class="participant-name"><strong>${esc(me?.name||'You')}</strong> <span class="you-badge"><i class="fas fa-user"></i> You</span></span><span class="participant-time">${timeAgo(me?.joinedAt)}</span></div>`;

        if (behindList.length) {
          html += `<div style="margin-top:1rem;"><i class="fas fa-arrow-down" style="color:#44ffaa;"></i> Behind (${behindList.length})</div>`;
          behindList.slice(0,5).forEach(p => {
            html += `<div class="participant-item"><span class="participant-pos">#${p.position}</span><span class="participant-name">${esc(p.name)}</span><span class="participant-time">${timeAgo(p.joinedAt)}</span></div>`;
          });
          if (behindList.length > 5) html += `<div style="text-align:center;opacity:0.6;">+${behindList.length-5} more</div>`;
        }
      } else {
        participants.forEach(p => {
          html += `<div class="participant-item"><span class="participant-pos">#${p.position}</span><span class="participant-name">${esc(p.name)}</span><span class="participant-time">${timeAgo(p.joinedAt)}</span></div>`;
        });
      }

      html += `</div><button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button><div style="text-align:center;font-size:0.7rem;opacity:0.5;margin-top:0.5rem;">Updates every 10s</div></div>`;

      app.innerHTML = html;
      document.getElementById('refreshBtn').onclick = () => { render(); toast('🔄 Refreshed!'); };
    }

    // Make toast available globally for copy button
    window.toast = toast;

    // Init
    render().then(() => {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(render, 10000);
    });

    window.addEventListener('beforeunload', () => clearInterval(refreshTimer));
  })();
</script>
</body>
</html>
