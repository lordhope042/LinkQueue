<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LinkQueue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🔗 LinkQueue</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        <div class="dashboard-header">
            <h1>My Queues</h1>
            <button class="btn btn-primary" id="createQueueBtn">+ Create New Queue</button>
        </div>

        <div id="queuesList" class="queues-grid">
            <div class="loading">Loading your queues...</div>
        </div>
    </div>

    <div id="createQueueModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Create New Queue</h2>
            <form id="createQueueForm">
                <input type="text" placeholder="Queue Name" id="queueName" required>
                <button type="submit" class="btn btn-primary">Create Queue</button>
            </form>
        </div>
    </div>

    <div id="queueDetailModal" class="modal modal-large">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="detailQueueName"></h2>
            <div class="queue-stats">
                <p>🔗 Shareable Link: <input type="text" id="shareLink" readonly></p>
                <button class="btn btn-small" onclick="copyLink()">Copy Link</button>
            </div>
            <div class="queue-controls">
                <button class="btn btn-success" id="nextBtn">Next →</button>
                <button class="btn btn-danger" id="endQueueBtn">End Queue</button>
            </div>
            <h3>Waiting Participants</h3>
            <div id="participantsList" class="participants-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
